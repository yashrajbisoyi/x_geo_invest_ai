<body>

<div id="toast-container"></div>

<div class="ticker-bar">

        <span class="ticker-sep">*</span>
        <span class="ticker-item"><span class="ticker-label">NIFTY</span><span class="ticker-val" id="tk-nifty">-</span></span>
        <span class="ticker-sep">*</span>
        <span class="ticker-item"><span class="ticker-label">SENSEX</span><span class="ticker-val" id="tk-sensex">-</span></span>
        <span class="ticker-sep">*</span>

<div class="page-orb page-orb-left"></div>

<nav class="navbar">

    </div>
    <div class="nav-links">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('analytics') }}">Analytics</a>
        <a href="{{ url_for('world_monitor') }}">World Monitor</a>
        <a href="{{ url_for('performance') }}">Performance</a>
        <a href="{{ url_for('news') }}">News Feed</a>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 20 20" fill="none" width="18" height="18" aria-hidden="true">
            <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.6"/>
            <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" width="18" height="18" aria-hidden="true">
            <path d="M20 15.5A8.5 8.5 0 0 1 8.5 4A8.5 8.5 0 1 0 20 15.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

<main class="container">
    {% block content %}{% endblock %}
</main>

<button id="geoBotFab" class="geo-bot-fab is-sleeping" type="button" aria-label="Open GeoFinance bot">
    <img src="{{ url_for('static', filename='img/bot-fab.webp') }}" alt="GeoFinance Bot" class="geo-bot-fab-img">
    <span class="geo-bot-zzz" aria-hidden="true">Zz</span>
</button>

<section id="geoBotPanel" class="geo-bot-panel" aria-hidden="true">
    <header class="geo-bot-head">
        <div>
            <p class="geo-bot-title">Bisoyi</p>
            <p class="geo-bot-sub">Ask anything. Friendly for everyday chat, strong on GeoFinance too.</p>
        </div>
        <button id="geoBotClose" class="geo-bot-icon" type="button" aria-label="Close chat">x</button>
    </header>
    <div id="geoBotMessages" class="geo-bot-messages"></div>
    <div class="geo-bot-actions">
        <button id="geoBotClear" class="secondary-button" type="button">Clear Chat</button>
    </div>
    <form id="geoBotForm" class="geo-bot-form">
        <textarea id="geoBotInput" maxlength="1400" placeholder="Ask any question..." required></textarea>
        <button id="geoBotSend" type="submit">Ask</button>
    </form>
</section>

<script>
(function() {
    var saved = localStorage.getItem("gf-theme") || "dark";
    document.documentElement.setAttribute("data-theme", saved);
})();
</script>

<script>
(function() {
    function fmtIN(v) {
        var n = Number(v);
        if (!isFinite(n)) return "N/A";
        return n.toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function setTicker(id, val, unit) {
        var text = val === "Unavailable" ? "N/A" : fmtIN(val) + (unit ? " " + unit : "");
        var cls = val === "Unavailable" ? "ticker-val down" : "ticker-val up";
        ["tk-" + id, "tk-" + id + "2"].forEach(function(elId) {
            var el = document.getElementById(elId);
            if (el) { el.textContent = text; el.className = cls; }
        });
    }
    function refreshTicker() {
        fetch("/api/live-data").then(function(r){ return r.json(); }).then(function(d) {
            setTicker("gold", d.gold, "Rs./oz");
            setTicker("oil", d.oil, "Rs./bbl");
            setTicker("nifty", d.nifty, "pts");
            setTicker("sensex", d.sensex, "pts");
            setTicker("fx", d.usdinr, "");
        }).catch(function(){});
    }
    refreshTicker();
    setInterval(refreshTicker, 60000);
})();
</script>

<script>
(function() {
    var btn = document.getElementById("themeToggle");
    var html = document.documentElement;
    btn.addEventListener("click", function() {
        var next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        localStorage.setItem("gf-theme", next);
        if (window.showToast) showToast(next === "dark" ? "Dark mode on" : "Light mode on", "info");
    });
})();
</script>

<script>
window.showToast = function(message, type) {
    type = type || "info";
    var container = document.getElementById("toast-container");
    var toast = document.createElement("div");
    toast.className = "toast toast-" + type;
    var icons = {
        success: '<svg viewBox="0 0 16 16" fill="none" width="15" height="15"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        error: '<svg viewBox="0 0 16 16" fill="none" width="15" height="15"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M6 6l4 4M10 6l-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>',
        info: '<svg viewBox="0 0 16 16" fill="none" width="15" height="15"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M8 7v4M8 5.5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>'
    };
    toast.innerHTML = '<span class="toast-icon">' + (icons[type] || icons.info) + '</span><span class="toast-msg">' + message + '</span>';
    container.appendChild(toast);
    setTimeout(function(){ toast.classList.add("toast-show"); }, 10);
    setTimeout(function(){
        toast.classList.remove("toast-show");
        setTimeout(function(){ if(toast.parentNode) toast.parentNode.removeChild(toast); }, 350);
    }, 3200);
};
</script>

<script>
(function() {
    var fab = document.getElementById("geoBotFab");
    var panel = document.getElementById("geoBotPanel");
    var closeBtn = document.getElementById("geoBotClose");
    var clearBtn = document.getElementById("geoBotClear");
    var form = document.getElementById("geoBotForm");
    var input = document.getElementById("geoBotInput");
    var sendBtn = document.getElementById("geoBotSend");
    var messages = document.getElementById("geoBotMessages");
    var loaded = false;
    var wakeDelayMs = 520;
    var sleepTimer = null;
    var sleepAfterIdleMs = 12000;

    function escapeHtml(text) {
        return String(text || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    function renderMessage(role, content) {
        var row = document.createElement("div");
        row.className = "geo-msg geo-msg-" + role;
        row.innerHTML = "<p>" + escapeHtml(content).replace(/\n/g, "<br>") + "</p>";
        messages.appendChild(row);
        messages.scrollTop = messages.scrollHeight;
        return row;
    }

    function renderThinkingMessage() {
        var row = document.createElement("div");
        row.className = "geo-msg geo-msg-assistant geo-msg-thinking";
        row.innerHTML = '<p><span class="thinking-label">Bisoyi is thinking</span><span class="thinking-dots" aria-hidden="true"><span></span><span></span><span></span></span></p>';
        messages.appendChild(row);
        messages.scrollTop = messages.scrollHeight;
        return row;
    }

    function setPanel(open) {
        if (open) {
            fab.classList.remove("is-sleeping");
            panel.classList.remove("open");
            void panel.offsetWidth;
            panel.classList.add("open");
            panel.setAttribute("aria-hidden", "false");
            if (!loaded) {
                fetch("/api/geochat/history")
                    .then(function(res){ return res.json(); })
                    .then(function(body){
                        if (body && body.status === "ok") {
                            messages.innerHTML = "";
                            var list = body.messages || [];
                            if (!list.length) {
                                renderMessage("assistant", "Hi, I am Bisoyi. Ask me anything. I am strongest in GeoFinance topics.");
                            } else {
                                list.forEach(function(item){
                                    renderMessage(item.role === "assistant" ? "assistant" : "user", item.content);
                                });
                            }
                            loaded = true;
                        }
                    })
                    .catch(function(){
                        renderMessage("assistant", "Chat history failed to load. You can still ask a new question.");
                        loaded = true;
                    });
            }
        } else {
            panel.classList.remove("open");
            panel.setAttribute("aria-hidden", "true");
            scheduleSleep();
        }
    }

    function enterSleep() {
        if (panel.classList.contains("open")) return;
        fab.classList.remove("is-waking");
        fab.classList.add("is-sleeping");
    }

    function scheduleSleep() {
        if (sleepTimer) clearTimeout(sleepTimer);
        sleepTimer = setTimeout(enterSleep, sleepAfterIdleMs);
    }

    function wakeBot() {
        if (sleepTimer) clearTimeout(sleepTimer);
        fab.classList.remove("is-sleeping");
        fab.classList.remove("is-waking");
        void fab.offsetWidth;
        fab.classList.add("is-waking");
        setTimeout(function() {
            fab.classList.remove("is-waking");
        }, wakeDelayMs);
    }

    fab.addEventListener("click", function(){
        wakeBot();
        setTimeout(function() {
            setPanel(true);
        }, wakeDelayMs - 40);
    });
    closeBtn.addEventListener("click", function(){ setPanel(false); });

    clearBtn.addEventListener("click", function() {
        clearBtn.disabled = true;
        fetch("/api/geochat/history", { method: "DELETE" })
            .then(function(res){ return res.json(); })
            .then(function(body){
                if (!body || body.status !== "ok") throw new Error("Failed to clear chat");
                messages.innerHTML = "";
                renderMessage("assistant", "Chat cleared. Ask a new GeoFinance question.");
                if (window.showToast) showToast("Bot chat cleared", "success");
            })
            .catch(function(error){
                if (window.showToast) showToast(error.message || "Failed to clear chat", "error");
            })
            .finally(function(){
                clearBtn.disabled = false;
            });
    });

    form.addEventListener("submit", function(event) {
        event.preventDefault();
        var question = (input.value || "").trim();
        if (!question) return;
        wakeBot();

        renderMessage("user", question);
        input.value = "";
        sendBtn.disabled = true;
        sendBtn.textContent = "Thinking...";
        var thinkingRow = renderThinkingMessage();

        fetch("/api/geochat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: question })
        })
        .then(function(res){ return res.json().then(function(body){ return { ok: res.ok, body: body }; }); })
        .then(function(result){
            if (!result.ok || !result.body || result.body.status !== "ok") {
                throw new Error((result.body && result.body.message) || "Bot failed to answer");
            }
            if (thinkingRow && thinkingRow.parentNode) thinkingRow.parentNode.removeChild(thinkingRow);
            renderMessage("assistant", result.body.answer || "No answer returned.");
        })
        .catch(function(error){
            if (thinkingRow && thinkingRow.parentNode) thinkingRow.parentNode.removeChild(thinkingRow);
            renderMessage("assistant", "I could not answer right now. " + (error.message || ""));
        })
        .finally(function(){
            sendBtn.disabled = false;
            sendBtn.textContent = "Ask";
        });
    });

    scheduleSleep();
})();
</script>

<style>
.geo-bot-fab {
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 1000;
    border: none !important;
    background: transparent !important;
    border-radius: 50%;
    width: 58px !important;
    min-width: 58px !important;
    max-width: 58px !important;
    height: 58px !important;
    padding: 0 !important;
    margin: 0 !important;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    cursor: pointer;
    box-shadow: none !important;
    transition: transform 0.2s ease, filter 0.25s ease;
    isolation: isolate;
    overflow: visible;
}
.geo-bot-fab::before {
    content: "";
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(157,143,255,0.42) 0%, rgba(109,94,252,0.22) 36%, rgba(109,94,252,0) 72%);
    filter: blur(8px);
    z-index: -2;
    pointer-events: none;
}
.geo-bot-fab::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -7px;
    width: 44px;
    height: 11px;
    transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(10,8,28,0.6) 0%, rgba(10,8,28,0) 72%);
    filter: blur(2px);
    z-index: -3;
    pointer-events: none;
}
.geo-bot-fab:hover {
    transform: translateY(-2px) scale(1.08);
    filter: saturate(1.12) brightness(1.03);
}
.geo-bot-fab:active {
    transform: translateY(0) scale(0.98);
}
.geo-bot-fab-img {
    width: 48px;
    height: 48px;
    object-fit: contain;
    pointer-events: none;
    filter:
        drop-shadow(0 3px 3px rgba(0,0,0,0.3))
        drop-shadow(0 10px 14px rgba(109,94,252,0.25));
}
.geo-bot-zzz {
    position: absolute;
    top: -10px;
    right: -8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: rgba(228,221,255,0.95);
    text-shadow: 0 2px 8px rgba(109,94,252,0.55);
    opacity: 0;
    pointer-events: none;
}
.geo-bot-fab.is-sleeping {
    animation: botSleepDrift 4.2s ease-in-out infinite;
}
.geo-bot-fab.is-sleeping .geo-bot-fab-img {
    filter:
        saturate(0.92)
        brightness(0.92)
        drop-shadow(0 3px 3px rgba(0,0,0,0.25))
        drop-shadow(0 10px 14px rgba(109,94,252,0.20));
}
.geo-bot-fab.is-sleeping .geo-bot-zzz {
    opacity: 1;
    animation: botZzz 2.3s ease-in-out infinite;
}
.geo-bot-fab.is-waking {
    animation: botWake 0.52s cubic-bezier(.2,.8,.2,1) both;
}
.geo-bot-fab.is-waking .geo-bot-zzz {
    opacity: 0;
    animation: none;
}
@keyframes botSleepDrift {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-3px) scale(0.985); }
}
@keyframes botWake {
    0% { transform: translateY(0px) scale(0.92); filter: brightness(0.96); }
    45% { transform: translateY(-6px) scale(1.10); filter: brightness(1.08); }
    100% { transform: translateY(0px) scale(1); filter: brightness(1); }
}
@keyframes botZzz {
    0% { transform: translate(0, 0) scale(0.95); opacity: 0.45; }
    50% { transform: translate(-2px, -4px) scale(1); opacity: 1; }
    100% { transform: translate(-4px, -8px) scale(0.92); opacity: 0.35; }
}
.geo-bot-panel {
    position: fixed;
    right: 20px;
    bottom: 96px;
    width: min(420px, calc(100vw - 24px));
    max-height: min(72vh, 680px);
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    gap: 10px;
    z-index: 60;
    border: 1px solid rgba(109,94,252,0.35);
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(23,20,52,0.95), rgba(18,16,44,0.95));
    box-shadow: 0 28px 90px rgba(0,0,0,0.45);
    padding: 12px;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transform: translateY(14px) scale(0.92);
    transform-origin: right bottom;
}
.geo-bot-panel.open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translateY(0) scale(1);
    animation: geoPanelPop 0.30s cubic-bezier(.2,.85,.2,1);
}
@keyframes geoPanelPop {
    0% {
        opacity: 0;
        transform: translateY(14px) scale(0.88);
    }
    70% {
        opacity: 1;
        transform: translateY(-2px) scale(1.02);
    }
    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}
.geo-bot-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
}
.geo-bot-title {
    font-size: 1rem;
    font-weight: 700;
    color: #f4f1ff;
}
.geo-bot-sub {
    font-size: 12px;
    color: #b9b4da;
    margin-top: 3px;
}
.geo-bot-icon {
    width: 28px !important;
    height: 28px !important;
    min-width: 28px !important;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    font-size: 20px;
    font-weight: 700;
    transform: translateY(-1px);
}
.geo-bot-messages {
    overflow: auto;
    display: grid;
    gap: 8px;
    padding-right: 2px;
}
.geo-msg {
    display: grid;
}
.geo-msg p {
    font-size: 13px;
    line-height: 1.45;
    padding: 10px 12px;
    border-radius: 12px;
    max-width: 94%;
}
.geo-msg-user { justify-items: end; }
.geo-msg-user p {
    background: rgba(255,142,60,0.25);
    border: 1px solid rgba(255,142,60,0.5);
    color: #fff0df;
}
.geo-msg-assistant p {
    background: rgba(109,94,252,0.20);
    border: 1px solid rgba(109,94,252,0.45);
    color: #ece8ff;
}
.geo-msg-thinking p {
    display: inline-flex;
    align-items: center;
    gap: 10px;
}
.thinking-label {
    opacity: 0.95;
}
.thinking-dots {
    display: inline-flex;
    align-items: center;
    gap: 5px;
}
.thinking-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(236,232,255,0.9);
    animation: botTypingPulse 1s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) {
    animation-delay: 0.18s;
}
.thinking-dots span:nth-child(3) {
    animation-delay: 0.36s;
}
@keyframes botTypingPulse {
    0%, 80%, 100% { transform: scale(0.72); opacity: 0.42; }
    40% { transform: scale(1); opacity: 1; }
}
.geo-bot-actions { display: flex; justify-content: flex-end; }
.geo-bot-form { display: grid; gap: 8px; }
.geo-bot-form textarea {
    min-height: 76px;
    max-height: 140px;
    resize: vertical;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: #fff;
    padding: 10px 11px;
    font-size: 13px;
}
@media (max-width: 760px) {
    .geo-bot-fab {
        right: 14px;
        bottom: 14px;
        width: 52px !important;
        height: 52px !important;
        min-width: 52px !important;
        max-width: 52px !important;
    }
    .geo-bot-fab-img { width: 43px; height: 43px; }
    .geo-bot-panel {
        right: 10px;
        bottom: 80px;
        width: calc(100vw - 20px);
        max-height: 74vh;
    }
}
</style>

</body>
</html>
