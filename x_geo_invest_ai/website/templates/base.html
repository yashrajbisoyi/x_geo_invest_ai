<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoFinance AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="toast-container"></div>

<div class="ticker-bar">
    <div class="ticker-track" id="tickerTrack">
        <span class="ticker-item"><span class="ticker-label">GOLD</span><span class="ticker-val" id="tk-gold">-</span></span>
        <span class="ticker-sep">*</span>
        <span class="ticker-item"><span class="ticker-label">OIL</span><span class="ticker-val" id="tk-oil">-</span></span>
        <span class="ticker-sep">*</span>
        <span class="ticker-item"><span class="ticker-label">NIFTY</span><span class="ticker-val" id="tk-nifty">-</span></span>
        <span class="ticker-sep">*</span>
        <span class="ticker-item"><span class="ticker-label">SENSEX</span><span class="ticker-val" id="tk-sensex">-</span></span>
        <span class="ticker-sep">*</span>
        <span class="ticker-item"><span class="ticker-label">USD/INR</span><span class="ticker-val" id="tk-fx">-</span></span>
        <span class="ticker-sep">*</span>
        <span class="ticker-item" aria-hidden="true"><span class="ticker-label">GOLD</span><span class="ticker-val" id="tk-gold2">-</span></span>
        <span class="ticker-sep" aria-hidden="true">*</span>
        <span class="ticker-item" aria-hidden="true"><span class="ticker-label">OIL</span><span class="ticker-val" id="tk-oil2">-</span></span>
        <span class="ticker-sep" aria-hidden="true">*</span>
        <span class="ticker-item" aria-hidden="true"><span class="ticker-label">NIFTY</span><span class="ticker-val" id="tk-nifty2">-</span></span>
        <span class="ticker-sep" aria-hidden="true">*</span>
        <span class="ticker-item" aria-hidden="true"><span class="ticker-label">SENSEX</span><span class="ticker-val" id="tk-sensex2">-</span></span>
        <span class="ticker-sep" aria-hidden="true">*</span>
        <span class="ticker-item" aria-hidden="true"><span class="ticker-label">USD/INR</span><span class="ticker-val" id="tk-fx2">-</span></span>
    </div>
</div>

<div class="page-orb page-orb-left"></div>
<div class="page-orb page-orb-right"></div>

<nav class="navbar">
    <div class="brand-mark">
        <span class="brand-dot"></span>
        <a href="{{ url_for('landing') }}" class="brand-link">GeoFinance AI<sup class="brand-tm">TM</sup></a>
    </div>
    <div class="nav-links">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('analytics') }}">Analytics</a>
        <a href="{{ url_for('world_monitor') }}">World Monitor</a>
        <a href="{{ url_for('performance') }}">Performance</a>
        <a href="{{ url_for('news') }}">News Feed</a>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 20 20" fill="none" width="18" height="18" aria-hidden="true">
            <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.6"/>
            <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" width="18" height="18" aria-hidden="true">
            <path d="M20 15.5A8.5 8.5 0 0 1 8.5 4A8.5 8.5 0 1 0 20 15.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
</nav>

<main class="container">
    {% block content %}{% endblock %}
</main>

<script>
(function() {
    var saved = localStorage.getItem("gf-theme") || "dark";
    document.documentElement.setAttribute("data-theme", saved);
})();
</script>

<script>
(function() {
    function fmtIN(v) {
        var n = Number(v);
        if (!isFinite(n)) return "N/A";
        return n.toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function setTicker(id, val, unit) {
        var text = val === "Unavailable" ? "N/A" : fmtIN(val) + (unit ? " " + unit : "");
        var cls = val === "Unavailable" ? "ticker-val down" : "ticker-val up";
        ["tk-" + id, "tk-" + id + "2"].forEach(function(elId) {
            var el = document.getElementById(elId);
            if (el) { el.textContent = text; el.className = cls; }
        });
    }
    function refreshTicker() {
        fetch("/api/live-data").then(function(r){ return r.json(); }).then(function(d) {
            setTicker("gold", d.gold, "Rs./oz");
            setTicker("oil", d.oil, "Rs./bbl");
            setTicker("nifty", d.nifty, "pts");
            setTicker("sensex", d.sensex, "pts");
            setTicker("fx", d.usdinr, "");
        }).catch(function(){});
    }
    refreshTicker();
    setInterval(refreshTicker, 60000);
})();
</script>

<script>
(function() {
    var btn = document.getElementById("themeToggle");
    var html = document.documentElement;
    btn.addEventListener("click", function() {
        var next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        localStorage.setItem("gf-theme", next);
        if (window.showToast) showToast(next === "dark" ? "Dark mode on" : "Light mode on", "info");
    });
})();
</script>

<script>
window.showToast = function(message, type) {
    type = type || "info";
    var container = document.getElementById("toast-container");
    var toast = document.createElement("div");
    toast.className = "toast toast-" + type;
    var icons = {
        success: '<svg viewBox="0 0 16 16" fill="none" width="15" height="15"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        error: '<svg viewBox="0 0 16 16" fill="none" width="15" height="15"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M6 6l4 4M10 6l-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>',
        info: '<svg viewBox="0 0 16 16" fill="none" width="15" height="15"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M8 7v4M8 5.5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>'
    };
    toast.innerHTML = '<span class="toast-icon">' + (icons[type] || icons.info) + '</span><span class="toast-msg">' + message + '</span>';
    container.appendChild(toast);
    setTimeout(function(){ toast.classList.add("toast-show"); }, 10);
    setTimeout(function(){
        toast.classList.remove("toast-show");
        setTimeout(function(){ if(toast.parentNode) toast.parentNode.removeChild(toast); }, 350);
    }, 3200);
};
</script>

</body>
</html>
